<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XELLE SYSTEM V18</title>
    <link rel="stylesheet" href="lims-theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

    <div class="wrapper">
        <nav class="sidebar">
            <div class="brand">
                <div id="sidebar-logo-place" class="brand-logo"></div>
                <div>
                    <span class="brand-text">XELLE</span>
                    <span class="brand-sub">Scientific System</span>
                </div>
            </div>

            <div class="filter-manager">
                <div class="filter-header">Gestor de Áreas</div>
                <div id="filter-container">
                    </div>
            </div>

            <div style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <div class="filter-item" onclick="Core.Auth.logout()">
                    <div class="f-icon"><i class="fas fa-sign-out-alt"></i></div>
                    <div class="f-label">Cerrar Sesión</div>
                </div>
            </div>
        </nav>

        <div class="main-content">
            <header class="top-header">
                <div class="search-wrapper">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchBox" class="search-bar" placeholder="Buscar formato, proceso o código...">
                </div>
                
                <div class="user-pill">
                    <div style="text-align:right; margin-right:5px;">
                        <div style="font-size:12px; font-weight:700; color:var(--c-navy);" id="u-name">Usuario</div>
                        <div style="font-size:10px; color:var(--c-text-muted);">EN LÍNEA</div>
                    </div>
                    <div class="u-avatar" id="u-initial">U</div>
                </div>
            </header>
            
            <div id="workspace" class="workspace">
                </div>
        </div>
    </div>

    <script src="config-users.js"></script>
    <script src="lims-core.js"></script>
    <script>
        $(document).ready(function() {
            if(window.SeedData && window.SeedData.LOGO_SVG) $('#sidebar-logo-place').html(window.SeedData.LOGO_SVG);
        });
    </script>
</body>
</html>
