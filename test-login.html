<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login - XELLE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #5568d3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
            word-wrap: break-word;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #e7f3ff;
            color: #004085;
            border: 1px solid #b8daff;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .info strong {
            display: block;
            margin-bottom: 5px;
        }
        pre {
            margin-top: 10px;
            background: #f4f4f4;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Test de Login - XELLE LIMS</h1>
        <p>Herramienta de diagnóstico para probar la conexión con el API</p>

        <div class="info">
            <strong>Credenciales de prueba:</strong>
            Usuario: <code>Xelle_Fer</code><br>
            Contraseña: <code>123</code>
        </div>

        <form id="testForm">
            <div class="form-group">
                <label for="username">Usuario:</label>
                <input type="text" id="username" value="Xelle_Fer" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" value="123" required>
            </div>

            <button type="submit" id="btnTest">Probar Login</button>
        </form>

        <div id="result" class="result"></div>
    </div>

    <script>
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            const btnTest = document.getElementById('btnTest');
            
            // Limpiar resultado anterior
            resultDiv.style.display = 'none';
            resultDiv.className = 'result';
            btnTest.disabled = true;
            btnTest.textContent = 'Probando...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                resultDiv.style.display = 'block';
                
                if (data.success) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <strong>✅ ¡Login exitoso!</strong>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                        <p style="margin-top:10px;">
                            El API está funcionando correctamente. 
                            Si aún no puedes acceder desde la página principal, 
                            intenta limpiar el caché del navegador.
                        </p>
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `
                        <strong>❌ Error de autenticación</strong>
                        <p>${data.msg || 'Credenciales incorrectas'}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
                
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <strong>⚠️ Error de conexión</strong>
                    <p>${error.message}</p>
                    <p style="margin-top:10px; font-size:12px;">
                        <strong>Posibles causas:</strong><br>
                        • El backend no está corriendo<br>
                        • Problema de red o CORS<br>
                        • El servicio nginx no está activo
                    </p>
                    <p style="margin-top:10px;">
                        <strong>Solución:</strong> Ejecuta en PowerShell:<br>
                        <code>docker-compose restart</code>
                    </p>
                `;
            } finally {
                btnTest.disabled = false;
                btnTest.textContent = 'Probar Login';
            }
        });
    </script>
</body>
</html>
