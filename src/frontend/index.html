<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XELLE LIMS - Acceso</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: "#2fa785", navy: "#1E3A5F", sky: "#64C4ED" },
                    fontFamily: { display: ["Manrope", "sans-serif"] }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(47, 167, 133, 0.15);
        }
        body { background-color: #f6f8f7; background-image: radial-gradient(at 0% 0%, rgba(47, 167, 133, 0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(30, 58, 95, 0.1) 0px, transparent 50%); }
    </style>
</head>
<body class="font-display min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden text-slate-800">

    <div class="w-full max-w-[440px] relative z-10">
        <div class="flex flex-col items-center mb-8">
            <div class="w-48 mb-4">
                 <svg viewBox="0 0 320 80" class="w-full h-auto drop-shadow-sm">
                    <defs> <style> .svg-logo-titulo { font-family: 'Arial Black', sans-serif; font-weight: 900; fill: #1E3A5F; } .svg-logo-subtitulo { font-family: 'Arial', sans-serif; font-weight: 700; fill: #1E3A5F; letter-spacing: 2px; } .svg-logo-celula { fill: #2E9D82; } </style> </defs>
                    <g transform="translate(0, -2) scale(0.85)">
                        <circle class="svg-logo-celula" cx="25" cy="25" r="13"/> <circle class="svg-logo-celula" cx="75" cy="75" r="13"/>
                        <path class="svg-logo-celula" d="M 15.81,65.81 C 28.54,53.08 33.74,59.19 46.46,46.46 C 59.19,33.74 53.08,28.54 65.81,15.81 A 13 13 0 1 1 84.19,34.19 C 71.46,46.92 66.26,40.81 53.54,53.54 C 40.81,66.26 46.92,71.46 34.19,84.19 A 13 13 0 1 1 15.81,65.81 Z"/>
                    </g>
                    <text x="90" y="42" class="svg-logo-titulo" font-size="34">XELLE</text>
                    <text x="91" y="68" class="svg-logo-subtitulo" font-size="19">SCIENTIFIC</text>
                    <text x="215" y="35" font-family="Arial" font-size="10" fill="#1D1D1B">®</text>
                </svg>
            </div>
            <p class="text-navy/60 text-sm font-semibold tracking-wide">Laboratory Information System v1.0</p>
        </div>

        <div class="glass-card rounded-2xl p-8 md:p-10">
            <div class="mb-6">
                <h2 class="text-navy text-2xl font-extrabold mb-1">Bienvenido</h2>
                <p class="text-slate-500 text-sm">Ingrese sus credenciales institucionales</p>
            </div>

            <div id="errorMsg" class="hidden flex items-center gap-3 p-3 mb-6 bg-red-50 border border-red-100 rounded-lg animate-pulse">
                <span class="material-symbols-outlined text-red-500 text-[20px]">error</span>
                <p id="errorText" class="text-red-600 text-xs font-bold uppercase tracking-wider">Error de credenciales</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-navy uppercase tracking-widest ml-1">Usuario</label>
                    <div class="relative group">
                        <input id="txtUser" type="text" class="w-full pl-10 pr-4 py-3 bg-white/60 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all font-semibold text-navy placeholder:text-slate-300" placeholder="ej. usuario.lab" required>
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">person</span>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-navy uppercase tracking-widest ml-1">Contraseña</label>
                    <div class="relative group">
                        <input id="txtPass" type="password" class="w-full pl-10 pr-4 py-3 bg-white/60 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all text-navy placeholder:text-slate-300" placeholder="••••••••" required>
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
                    </div>
                </div>

                <button type="submit" id="btnLogin" class="w-full py-3.5 bg-primary hover:bg-emerald-600 text-white font-bold rounded-xl shadow-lg shadow-primary/20 transition-all transform active:scale-95 flex items-center justify-center gap-2">
                    <span>INICIAR SESIÓN</span>
                    <span class="material-symbols-outlined text-[20px]">login</span>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-100">
                <div class="flex items-start gap-3 opacity-60">
                    <span class="material-symbols-outlined text-navy text-[18px] mt-0.5">verified_user</span>
                    <p class="text-[10px] leading-relaxed text-navy font-medium uppercase tracking-wide">
                        Cumplimiento FDA 21 CFR Parte 11. <br>Acceso monitoreado y auditado.
                    </p>
                </div>
                <div class="text-center mt-4">
                     <a href="#" onclick="hardReset()" class="text-[10px] font-bold text-primary hover:underline">↻ Resetear Datos Locales</a>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/config/users.js"></script>
    <script src="assets/js/core/core.js"></script>
    <script>
        $(document).ready(function() {
            $('#loginForm').on('submit', function(e) {
                e.preventDefault();
                const u = $('#txtUser').val();
                const p = $('#txtPass').val();
                const $btn = $('#btnLogin');
                const $err = $('#errorMsg');
                
                $btn.prop('disabled', true).addClass('opacity-75');
                $err.addClass('hidden');

                // Detectar URL del backend dinámicamente
                const backendUrl = window.location.hostname === 'localhost' 
                    ? 'http://localhost:8000'
                    : `http://${window.location.hostname}:8000`;

                // Lógica Híbrida (Backend o Local)
                fetch(`${backendUrl}/api/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: u, password: p })
                })
                .then(res => res.json())
                .then(data => {
                    if(data.success) {
                        Core.Data.set(KEYS.SESSION, data.user);
                        window.location.href = 'dashboard.html';
                    } else { throw new Error(data.msg); }
                })
                .catch(err => {
                    // Fallback Local
                    console.log("Intentando login local...");
                    const res = Core.Auth.login(u, p);
                    if(res.success) window.location.href = 'dashboard.html';
                    else {
                        $('#errorText').text(err.message || res.msg);
                        $err.removeClass('hidden');
                        $btn.prop('disabled', false).removeClass('opacity-75');
                    }
                });
            });
        });
        function hardReset() { if(confirm("¿Borrar caché local?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
