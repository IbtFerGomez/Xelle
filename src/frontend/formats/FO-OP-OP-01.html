<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>FO-OP-OP-01</title>
    <link rel="stylesheet" href="format-styles-comercial.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="format-app-comercial.js"></script>
</head>

<body id="doc-fo-op-op-01">
    <div class="global-controls no-print">
        <button class="btn btn-success" onclick="saveForm()">Guardar</button>
        <button class="btn btn-primary" onclick="printForm()">Imprimir</button>
        <button class="btn btn-danger" onclick="clearForm()">Limpiar</button>
    </div>

    <div class="container">
        <div class="header-top">
            <div class="logo-container">
                <h2>XELLE OPERACIÓN</h2>
            </div>
            <div class="registry-container">
                <label>Registro Operativo</label>
                <div class="registry-wrapper">
                    <span class="registry-prefix">FO-OP-OP-01-</span>
                    <input type="text" id="reg-op-op-01" class="registry-input generate-barcode"
                        data-target="barcode-op-op-01" data-prefix="FO-OP-OP-01-" placeholder="001">
                </div>
                <input type="date" class="registry-date no-auto-date">
                <svg id="barcode-op-op-01" class="barcode-svg"></svg>
            </div>
        </div>

        <div class="header-main">
            <h1>FORMATO OPERATIVO BASE</h1>
            <div class="metadata">Código: FO-OP-OP-01 | Versión: 1.0</div>
        </div>

        <div class="section">
            <div class="section-title">Datos Operativos</div>
            <table class="no-border-table">
                <tr>
                    <td><strong>Área:</strong> <input id="op-area" class="cedit"></td>
                    <td><strong>Responsable:</strong> <input id="op-responsable" class="cedit"></td>
                </tr>
                <tr>
                    <td colspan="2"><strong>Descripción:</strong> <textarea id="op-descripcion"
                            class="cedit"></textarea></td>
                </tr>
            </table>
        </div>
    </div>
</body>

</html>
