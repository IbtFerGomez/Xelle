<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ET-LC-12 - Medio Condicionado V1.1</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #f4f4f4; }
        .etiqueta-container {
            width: 100mm; height: 100mm; background-color: #ffffff; border: 2px solid #000;
            padding: 5mm; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between;
        }
        .logo-area { text-align: center; margin-bottom: 5px; }
        .logo-area svg { width: 30px; height: 30px; vertical-align: middle; }
        .logo-text { font-size: 12px; font-weight: bold; vertical-align: middle; margin-left: 5px; color: #2c3e50; }
        
        .titulo-alerta { 
            text-align: center; font-size: 14px; font-weight: 900; letter-spacing: 0.5px; 
            margin: 0 0 2px 0; background-color: #e1f5fe; color: #01579b; 
            padding: 4px; border: 1px solid #03a9f4; 
        }
        .subtitulo { text-align: center; font-size: 8.5px; font-weight: bold; margin-bottom: 8px; color: #0277bd; text-transform: uppercase; }
        
        .campo { display: flex; align-items: flex-end; margin-bottom: 8px; font-size: 9.5px; }
        .campo label { font-weight: bold; white-space: nowrap; margin-right: 5px; }
        .linea { flex-grow: 1; border-bottom: 1px solid #000; height: 12px; }
        
        .fila-triple { display: flex; justify-content: space-between; gap: 8px; }
        .fila-triple .campo { flex: 1; }

        .caja-estatus { 
            border: 1px solid #ccc; padding: 5px; margin: 4px 0; 
            font-size: 9px; background-color: #fcfcfc;
        }
        .check-group { display: flex; justify-content: space-around; margin-top: 3px; }

        .footer-bottom { margin-top: 5px; font-size: 8px; text-align: center; color: #777; border-top: 1px solid #ccc; padding-top: 4px; }
        
        @media print { 
            @page { margin: 0; } 
            body { margin: 0; padding: 0; background: #fff; } 
            .etiqueta-container { border: none; } 
        }
    </style>
</head>
<body>
    <div class="etiqueta-container">
        <div>
            <div class="logo-area">
                <svg viewBox="10 10 80 80" xmlns="http://www.w3.org/2000/svg">
                  <g><circle fill="#2E9D82" cx="25" cy="25" r="13" /><circle fill="#2E9D82" cx="75" cy="75" r="13" /><path fill="#2E9D82" d="M 15.81,65.81 C 28.54,53.08 33.74,59.19 46.46,46.46 C 59.19,33.74 53.08,28.54 65.81,15.81 A 13 13 0 1 1 84.19,34.19 C 71.46,46.92 66.26,40.81 53.54,53.54 C 40.81,66.26 46.92,71.46 34.19,84.19 A 13 13 0 1 1 15.81,65.81 Z" /></g>
                </svg>
                <span class="logo-text">XELLE SCIENTIFIC</span>
            </div>
            <div class="titulo-alerta">🧪 MEDIO CONDICIONADO RECUPERADO</div>
            <div class="subtitulo">TRAZABILIDAD DE SUBPRODUCTO CELULAR</div>
            
            <div class="campo" style="margin-top:5px;"><label>ID Lote de Origen:</label><div class="linea"></div></div>
            
            <div class="fila-triple">
                <div class="campo" style="flex: 2;"><label>Tipo Celular:</label><div class="linea"></div></div>
                <div class="campo"><label>Pasaje (P):</label><div class="linea"></div></div>
            </div>
            
            <div class="fila-triple">
                <div class="campo" style="flex: 2;"><label>Fecha Recolección:</label><div class="linea" style="text-align:center; color:#777;">//____</div></div>
                <div class="campo"><label>Volumen:</label><div class="linea"></div><span style="margin-left:2px;">mL</span></div>
            </div>

            <div class="campo"><label>ID Recipiente:</label><div class="linea"></div></div>

            <div class="caja-estatus">
                <strong>Estatus:</strong>
                <div class="check-group">
                    <span>☐ En Evaluación</span>
                    <span>☐ Uso en Investigación</span>
                </div>
            </div>

            <div class="caja-estatus" style="border-style: dashed;">
                <strong>Almacenamiento:</strong>
                <div class="check-group">
                    <span>☐ 2°C a 8°C</span>
                    <span>☐ -20°C</span>
                </div>
            </div>
        </div>

        <div>
            <div class="campo"><label>Operador que recupera:</label><div class="linea"></div></div>
            <div class="footer-bottom">Código: ET-LC-21-REV | Versión: 1.1</div>
        </div>
    </div>
</body>
</html>
