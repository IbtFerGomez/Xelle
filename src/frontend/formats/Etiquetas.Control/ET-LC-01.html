<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>01 - Muestreado</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .etiqueta-container {
            width: 100mm;
            height: 100mm;
            background-color: #ffffff;
            border: 2px solid #000;
            padding: 5mm;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header-top {
            font-size: 8px;
            text-align: right;
            color: #555;
            margin-bottom: 2px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 5px;
        }

        .logo-area svg {
            width: 30px;
            height: 30px;
            vertical-align: middle;
        }

        .logo-text {
            font-size: 12px;
            font-weight: bold;
            vertical-align: middle;
            margin-left: 5px;
            color: #2c3e50;
        }

        .titulo-alerta {
            text-align: center;
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 1px;
            margin: 0 0 2px 0;
            background-color: #ffeb3b;
            padding: 3px;
            border: 1px solid #000;
            color: #000;
        }

        .subtitulo {
            text-align: center;
            font-size: 9px;
            font-weight: bold;
            margin-bottom: 10px;
            text-decoration: underline;
        }

        .campo {
            display: flex;
            align-items: flex-end;
            margin-bottom: 8px;
            font-size: 11px;
        }

        .campo label {
            font-weight: bold;
            white-space: nowrap;
            margin-right: 5px;
        }

        .linea {
            flex-grow: 1;
            border-bottom: 1px solid #000;
            height: 12px;
        }

        .fila-doble {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .fila-doble .campo {
            flex: 1;
        }

        .firma-area {
            margin-top: 15px;
            text-align: center;
        }

        .linea-firma {
            width: 80%;
            border-bottom: 1px solid #000;
            margin: 0 auto 3px auto;
            height: 15px;
        }

        .firma-label {
            font-size: 10px;
            font-weight: bold;
        }

        .sello-advertencia {
            margin-top: 10px;
            text-align: center;
            font-size: 9px;
            font-weight: bold;
            color: #d32f2f;
            border-top: 1px dotted #000;
            padding-top: 5px;
        }

        .footer-bottom {
            margin-top: 5px;
            font-size: 8px;
            text-align: left;
            color: #777;
        }

        @media print {
            @page {
                margin: 0;
            }

            body {
                margin: 0;
                padding: 0;
                background: #fff;
            }

            .etiqueta-container {
                border: none;
            }
        }
    </style>
</head>

<body>
    <div class="etiqueta-container">
        <div>
            <div class="header-top">Código: ET-LC-01 | Versión: 1.0 | Vigencia: ENE 2026 | Página: 1 de 1</div>
            <div class="logo-area">
                <svg viewBox="10 10 80 80" xmlns="http://www.w3.org/2000/svg">
                    <g>
                        <circle fill="#2E9D82" cx="25" cy="25" r="13" />
                        <circle fill="#2E9D82" cx="75" cy="75" r="13" />
                        <path fill="#2E9D82"
                            d="M 15.81,65.81 C 28.54,53.08 33.74,59.19 46.46,46.46 C 59.19,33.74 53.08,28.54 65.81,15.81 A 13 13 0 1 1 84.19,34.19 C 71.46,46.92 66.26,40.81 53.54,53.54 C 40.81,66.26 46.92,71.46 34.19,84.19 A 13 13 0 1 1 15.81,65.81 Z" />
                    </g>
                </svg>
                <span class="logo-text">XELLE SCIENTIFIC</span>
            </div>
            <div class="titulo-alerta">⚠️ M U E S T R E A D O ⚠️</div>
            <div class="subtitulo">USO EXCLUSIVO DE CONTROL DE CALIDAD</div>
            <div class="campo"><label>Producto:</label>
                <div class="linea"></div>
            </div>
            <div class="campo"><label>Lote:</label>
                <div class="linea"></div>
            </div>
            <div class="fila-doble">
                <div class="campo"><label>Cantidad Retirada:</label>
                    <div class="linea"></div><span style="font-size:10px; margin-left:3px;">unid.</span>
                </div>
                <div class="campo"><label>Fecha:</label>
                    <div class="linea" style="text-align:center; color:#777; font-size:10px;">DD/MM/AAAA</div>
                </div>
            </div>
        </div>
        <div>
            <div class="firma-area">
                <div class="linea-firma"></div>
                <div class="firma-label">Muestreó (Nombre y Firma)</div>
            </div>
            <div class="sello-advertencia">Sello de integridad. No remover sin autorización de Calidad.</div>
            <div class="footer-bottom">(Referencia de control interno)</div>
        </div>
    </div>
</body>

</html>
